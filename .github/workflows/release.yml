name: Universal Plugin Release

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect build system
        id: detect
        run: |
          if [ -f "./gradlew" ]; then
            echo "TYPE=gradle" >> "$GITHUB_OUTPUT"
          elif [ -f "./pom.xml" ]; then
            echo "TYPE=maven" >> "$GITHUB_OUTPUT"
          else
            echo "No supported build system found"
            exit 1
          fi

      - name: Read config
        id: cfg
        run: |
          emit() {
            printf '%s<<EOF\n%s\nEOF\n' "$1" "$2" >> "$GITHUB_OUTPUT"
          }

          clean_csv() {
            echo "$1" | tr ',' '\n' | sed '/^$/d' | paste -sd ',' -
          }

          if [ "${{ steps.detect.outputs.TYPE }}" = "gradle" ]; then

            get_prop() {
              grep -m1 "^$1=" gradle.properties | cut -d'=' -f2- | tr -d '\r'
            }

            get_name() {
              sed -nE "s/^[[:space:]]*rootProject\.name[[:space:]]*=[[:space:]]*['\"]([^'\"]+)['\"].*/\1/p" \
                settings.gradle settings.gradle.kts 2>/dev/null | head -n 1
            }

            NAME="$(get_name)"
            VERSION="$(get_prop version)"
            JAVA_VERSION="$(get_prop javaVersion)"
            MODRINTH_ID="$(get_prop modrinthId)"
            CURSEFORGE_ID="$(get_prop curseforgeId)"

            LOADERS="$(clean_csv "$(get_prop loaders)")"

            # 🔥 FIX: gameVersions fallback + validation
            RAW_GAMES="$(get_prop gameVersions)"

            if [ -z "$RAW_GAMES" ]; then
              echo "⚠️ WARNING: gameVersions missing, using fallback 1.20.1"
              RAW_GAMES="1.20.1"
            fi

            GAMES="$(clean_csv "$RAW_GAMES")"

            CHANGELOG_FILE="$(get_prop changelogFile)"

          else

            get_xml() {
              sed -n "s/.*<$1>\(.*\)<\/$1>.*/\1/p" pom.xml | head -n 1
            }

            NAME="$(get_xml artifactId)"
            VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
            JAVA_VERSION="$(sed -n 's/.*<java\.version>\(.*\)<\/java\.version>.*/\1/p' pom.xml | head -n 1)"
            MODRINTH_ID="$(get_xml modrinthId)"
            CURSEFORGE_ID="$(get_xml curseforgeId)"

            LOADERS="$(clean_csv "$(get_xml loaders)")"

            # 🔥 FIX: Maven fallback
            RAW_GAMES="$(get_xml gameVersions)"

            if [ -z "$RAW_GAMES" ]; then
              echo "⚠️ WARNING: gameVersions missing, using fallback 1.20.1"
              RAW_GAMES="1.20.1"
            fi

            GAMES="$(clean_csv "$RAW_GAMES")"

            CHANGELOG_FILE="$(get_xml changelogFile)"
          fi

          emit NAME "$NAME"
          emit VERSION "$VERSION"
          emit JAVA_VERSION "$JAVA_VERSION"
          emit MODRINTH_ID "$MODRINTH_ID"
          emit CURSEFORGE_ID "$CURSEFORGE_ID"
          emit LOADERS "$LOADERS"
          emit GAMES "$GAMES"
          emit CHANGELOG_FILE "$CHANGELOG_FILE"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ steps.cfg.outputs.JAVA_VERSION }}
          cache: ${{ steps.detect.outputs.TYPE }}

      - name: Build (Gradle)
        if: steps.detect.outputs.TYPE == 'gradle'
        run: |
          chmod +x gradlew
          ./gradlew clean shadowJar

      - name: Build (Maven)
        if: steps.detect.outputs.TYPE == 'maven'
        run: mvn clean package

      - name: Find JAR
        id: jar
        run: |
          if [ -d "build/libs" ]; then
            echo "JAR=$(ls build/libs/*.jar | head -n 1)" >> "$GITHUB_OUTPUT"
          else
            echo "JAR=$(ls target/*.jar | head -n 1)" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract changelog
        id: changelog
        run: |
          FILE="${{ steps.cfg.outputs.CHANGELOG_FILE }}"

          awk '
            BEGIN { p=0; c=0 }
            /^##[[:space:]]/ {
              c++
              if (c==1) { p=1; next }
              if (c==2) { p=0 }
            }
            p==1 { print }
          ' "$FILE" > latest.md

          {
            echo "MARKDOWN<<EOF"
            cat latest.md
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          echo "<ul>" > latest.html
          while IFS= read -r line; do
            line="$(echo "$line" | sed 's/^ *//;s/ *$//')"

            if [[ "$line" == "- "* ]]; then
              content="${line#- }"
              content="${content//&/&amp;}"
              content="${content//</&lt;}"
              content="${content//>/&gt;}"
              echo "  <li>$content</li>" >> latest.html
            fi
          done < latest.md
          echo "</ul>" >> latest.html

          {
            echo "HTML<<EOF"
            cat latest.html
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Publish
        uses: Kir-Antipov/mc-publish@v3
        with:
          files: ${{ steps.jar.outputs.JAR }}

          modrinth-id: ${{ steps.cfg.outputs.MODRINTH_ID }}
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}

          curseforge-id: ${{ steps.cfg.outputs.CURSEFORGE_ID }}
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}

          name: ${{ steps.cfg.outputs.NAME }} ${{ steps.cfg.outputs.VERSION }}
          version: ${{ steps.cfg.outputs.VERSION }}

          changelog: ${{ steps.changelog.outputs.MARKDOWN }}
          curseforge-changelog: ${{ steps.changelog.outputs.HTML }}

          loaders: ${{ steps.cfg.outputs.LOADERS }}
          game-versions: ${{ steps.cfg.outputs.GAMES }}

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.cfg.outputs.VERSION }}
          name: ${{ steps.cfg.outputs.NAME }} ${{ steps.cfg.outputs.VERSION }}
          body: ${{ steps.changelog.outputs.MARKDOWN }}
          files: ${{ steps.jar.outputs.JAR }}