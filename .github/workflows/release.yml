name: VoiceServer Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      # 📥 Repo holen
      - name: Checkout
        uses: actions/checkout@v4

      # ⚡ Maven Cache
      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2

      # ☕ Java Setup (Java 21)
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      # 📦 Build
      - name: Build with Maven
        run: mvn clean package

      # 📦 JAR finden
      - name: Find JAR file
        id: jar
        run: echo "JAR=$(ls target/*.jar | head -n 1)" >> $GITHUB_OUTPUT

      # 🏷️ Version aus Tag
      - name: Extract version
        id: vars
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      # 📝 Changelog
      - name: Set changelog
        id: changelog
        run: |
          echo "CHANGELOG=VoiceServer Release ${{ steps.vars.outputs.VERSION }}" >> $GITHUB_OUTPUT

      # 🔵 MODRINTH + CURSEFORGE (FIXED)
      - name: Publish to Modrinth & CurseForge
        uses: Kir-Antipov/mc-publish@v3
        with:
          modrinth-id: HAYLhcHS
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}

          curseforge-id: 1310398
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}

          files: ${{ steps.jar.outputs.JAR }}

          name: VoiceServer ${{ steps.vars.outputs.VERSION }}
          version: ${{ steps.vars.outputs.VERSION }}
          changelog: ${{ steps.changelog.outputs.CHANGELOG }}

          loaders: paper
          game-versions: 1.8.8

      # 📦 GitHub Release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: VoiceServer ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.CHANGELOG }}
          files: ${{ steps.jar.outputs.JAR }}