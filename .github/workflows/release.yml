name: VoiceServer Release

on:
  push:
    branches:
      - master   # oder main

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build with Maven
        run: mvn clean package

      - name: Find JAR
        id: jar
        run: echo "JAR=$(ls target/*.jar | head -n 1)" >> $GITHUB_OUTPUT

      # 🔥 Version jetzt aus Run-ID (kein Tag mehr)
      - name: Generate version
        id: vars
        run: echo "VERSION=build-${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Extract latest changelog section
        id: changelog
        run: |
          awk '
            /^## / { if (seen++) exit }
            { print }
          ' CHANGELOG.md > changelog.txt

          {
            echo "CHANGELOG<<EOF"
            cat changelog.txt
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Publish Modrinth + CurseForge
        uses: Kir-Antipov/mc-publish@v3
        with:
          modrinth-id: HAYLhcHS
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}

          curseforge-id: 1310398
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}

          files: ${{ steps.jar.outputs.JAR }}

          name: VoiceServer ${{ steps.vars.outputs.VERSION }}
          version: ${{ steps.vars.outputs.VERSION }}

          changelog: ${{ steps.changelog.outputs.CHANGELOG }}

          loaders: |
            paper
            spigot
            bukkit
            purpur
            folia

          game-versions: |
            1.8.8
            1.12.2
            1.16.5
            1.18.2
            1.20.1
            1.21.1
            1.21.2

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: VoiceServer build-${{ github.run_number }}
          body: Automated build
          files: ${{ steps.jar.outputs.JAR }}